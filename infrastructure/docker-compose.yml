# =============================================================================
# Docker Compose - Full Platform Stack
#
# USAGE:
#   docker-compose up --build          # Build images and start everything
#   docker-compose up -d               # Run in background (detached mode)
#   docker-compose down -v             # Stop and remove containers + volumes
#   docker-compose logs -f api-gateway # Follow logs for one service
#
# PREREQUISITE: Docker Desktop (or Docker Engine + Compose plugin) installed.
#
# SERVICE PORTS:
#   API Gateway      → http://localhost:5000   (OpenAPI at /openapi)
#   Transaction Svc  → http://localhost:5001
#   Risk Svc         → http://localhost:5002
#   Payment Svc      → http://localhost:5003
#   Compliance Svc   → http://localhost:5004
#   SQL Server       → localhost:1433          (SA password: YourStrong!Passw0rd)
#   Redis            → localhost:6379
#   RabbitMQ         → localhost:5672  (Management UI: http://localhost:15672)
#   Kafka            → localhost:9092
#   Prometheus       → http://localhost:9090
#   Grafana          → http://localhost:3000   (admin/admin)
#   Transaction UI   → http://localhost:3001
#   Admin Dashboard  → http://localhost:3002
#   Risk Dashboard   → http://localhost:3003
#   Audit Dashboard  → http://localhost:3004
#   Superapp         → http://localhost:3000   (all dashboards in one)
#
# NOTE ON EVENT FLOW:
#   Cross-service events use Redis Streams as the default transport. Each
#   microservice connects to the shared Redis instance and publishes/subscribes
#   via consumer groups (one group per service name). The event pipeline is:
#     TransactionCreated → RiskEvaluated → PaymentAuthorized → AuditLogged
#   The EventBus__DefaultBackend env var can be changed to RabbitMQ or Kafka
#   to use those transports instead (all three are fully implemented).
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # SQL SERVER 2022
  # Microsoft's relational database. Used by TransactionService (for
  # Transactions + Users tables) and ComplianceService (for AuditLogs table).
  #
  # The healthcheck waits until SQL Server is fully started before the dependent
  # .NET services launch - preventing "cannot connect" startup failures.
  # ---------------------------------------------------------------------------
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: financial_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - backend-net

  # ---------------------------------------------------------------------------
  # REDIS 7
  # In-memory data store used as an optional event bus backend and for caching.
  # The AdaptiveEventBus switches to Redis when CPU load is 25–50%.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: financial_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - backend-net

  # ---------------------------------------------------------------------------
  # RABBITMQ 3 (with Management UI)
  # Message broker used as an event bus backend at medium-high load (50–75% CPU).
  # Management UI at http://localhost:15672 (guest/guest).
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: financial_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - backend-net

  # ---------------------------------------------------------------------------
  # APACHE ZOOKEEPER - required by Kafka for cluster coordination
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: financial_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - platform-net

  # ---------------------------------------------------------------------------
  # APACHE KAFKA - high-throughput event streaming, used at CPU >= 75%.
  # KAFKA_ADVERTISED_LISTENERS includes both the Docker-internal hostname and
  # the host-accessible localhost so both producers/consumers inside Docker and
  # tools on the host can connect.
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: financial_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - backend-net

  # ---------------------------------------------------------------------------
  # API GATEWAY (port 5000)
  # Entry point for all client requests. Handles JWT authentication, SSE
  # streaming, service health checks, and request logging.
  # ---------------------------------------------------------------------------
  api-gateway:
    build:
      context: ..
      dockerfile: backend/src/FinancialPlatform.ApiGateway/Dockerfile
    container_name: financial_api_gateway
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=FinancialPlatform
      - ServiceUrls__TransactionService=http://transaction-service:5001
      - ServiceUrls__RiskService=http://risk-service:5002
      - ServiceUrls__PaymentService=http://payment-service:5003
      - ServiceUrls__ComplianceService=http://compliance-service:5004
      - ServiceUrls__PinEncryptionService=http://pin-encryption-service:5005
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - frontend-net
      - backend-net

  # ---------------------------------------------------------------------------
  # TRANSACTION SERVICE (port 5001)
  # Creates, validates and persists financial transactions to SQL Server.
  # Publishes TransactionCreatedEvent after each successful transaction.
  # ---------------------------------------------------------------------------
  transaction-service:
    build:
      context: ..
      dockerfile: backend/src/FinancialPlatform.TransactionService/Dockerfile
    container_name: financial_transaction_svc
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=FinancialPlatform
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=FinancialPlatform_Transactions;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      - EventBus__DefaultBackend=Redis
      - EventBus__RedisUrl=redis:6379
      - EventBus__RabbitMqUrl=amqp://guest:guest@rabbitmq:5672
      - EventBus__KafkaBrokers=kafka:9092
      - EventBus__ServiceName=transaction-service
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net

  # ---------------------------------------------------------------------------
  # RISK SERVICE (port 5002)
  # Stateless service - no database. Evaluates risk based on velocity, amount,
  # and time-of-day rules.
  # ---------------------------------------------------------------------------
  risk-service:
    build:
      context: ..
      dockerfile: backend/src/FinancialPlatform.RiskService/Dockerfile
    container_name: financial_risk_svc
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=FinancialPlatform
      - EventBus__DefaultBackend=Redis
      - EventBus__RedisUrl=redis:6379
      - EventBus__RabbitMqUrl=amqp://guest:guest@rabbitmq:5672
      - EventBus__KafkaBrokers=kafka:9092
      - EventBus__ServiceName=risk-service
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend-net

  # ---------------------------------------------------------------------------
  # PAYMENT SERVICE (port 5003)
  # Stateless service. Applies authorization rules and publishes
  # PaymentAuthorizedEvent.
  # ---------------------------------------------------------------------------
  payment-service:
    build:
      context: ..
      dockerfile: backend/src/FinancialPlatform.PaymentService/Dockerfile
    container_name: financial_payment_svc
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=FinancialPlatform
      - EventBus__DefaultBackend=Redis
      - EventBus__RedisUrl=redis:6379
      - EventBus__RabbitMqUrl=amqp://guest:guest@rabbitmq:5672
      - EventBus__KafkaBrokers=kafka:9092
      - EventBus__ServiceName=payment-service
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend-net

  # ---------------------------------------------------------------------------
  # COMPLIANCE SERVICE (port 5004)
  # Persists every system event as an immutable audit log with SHA-256 hash
  # chaining. Exposes Prometheus metrics at /metrics.
  # ---------------------------------------------------------------------------
  compliance-service:
    build:
      context: ..
      dockerfile: backend/src/FinancialPlatform.ComplianceService/Dockerfile
    container_name: financial_compliance_svc
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=FinancialPlatform
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=FinancialPlatform_Compliance;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      - EventBus__DefaultBackend=Redis
      - EventBus__RedisUrl=redis:6379
      - EventBus__RabbitMqUrl=amqp://guest:guest@rabbitmq:5672
      - EventBus__KafkaBrokers=kafka:9092
      - EventBus__ServiceName=compliance-service
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net

  # ---------------------------------------------------------------------------
  # PIN ENCRYPTION SERVICE (port 5005)
  # Stateless service. HSM key store held in memory, seeded on startup.
  # Subscribes to TransactionCreatedEvent, publishes PinVerifiedEvent.
  # ---------------------------------------------------------------------------
  pin-encryption-service:
    build:
      context: ..
      dockerfile: backend/src/FinancialPlatform.PinEncryptionService/Dockerfile
    container_name: financial_pin_encryption_svc
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=FinancialPlatform
      - EventBus__DefaultBackend=Redis
      - EventBus__RedisUrl=redis:6379
      - EventBus__RabbitMqUrl=amqp://guest:guest@rabbitmq:5672
      - EventBus__KafkaBrokers=kafka:9092
      - EventBus__ServiceName=pin-encryption-service
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend-net

  # ---------------------------------------------------------------------------
  # PROMETHEUS
  # Scrapes metrics from all backend services via Docker network.
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: financial_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - backend-net

  # ---------------------------------------------------------------------------
  # GRAFANA
  # Connects to Prometheus and visualises metrics on dashboards.
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.2.0
    container_name: financial_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - frontend-net

  # ---------------------------------------------------------------------------
  # FRONTEND - TRANSACTION UI (port 3001)
  # React SPA for creating and viewing transactions. Nginx proxies /api
  # requests to the API Gateway over the Docker network.
  # ---------------------------------------------------------------------------
  transaction-ui:
    build:
      context: ..
      dockerfile: frontend/apps/transaction-ui/Dockerfile
    container_name: financial_transaction_ui
    ports:
      - "3001:80"
    depends_on:
      - api-gateway
    networks:
      - frontend-net

  # ---------------------------------------------------------------------------
  # FRONTEND - ADMIN DASHBOARD (port 3002)
  # Dashboard with platform metrics, system health, and event bus status.
  # Uses mock data - no backend API calls.
  # ---------------------------------------------------------------------------
  admin-dashboard:
    build:
      context: ..
      dockerfile: frontend/apps/admin-dashboard/Dockerfile
    container_name: financial_admin_dashboard
    ports:
      - "3002:80"
    networks:
      - frontend-net

  # ---------------------------------------------------------------------------
  # FRONTEND - RISK DASHBOARD (port 3003)
  # Real-time risk monitoring dashboard. Uses mock data.
  # ---------------------------------------------------------------------------
  risk-dashboard:
    build:
      context: ..
      dockerfile: frontend/apps/risk-dashboard/Dockerfile
    container_name: financial_risk_dashboard
    ports:
      - "3003:80"
    networks:
      - frontend-net

  # ---------------------------------------------------------------------------
  # FRONTEND - AUDIT DASHBOARD (port 3004)
  # Audit log viewer with hash chain verification. Uses mock data.
  # ---------------------------------------------------------------------------
  audit-dashboard:
    build:
      context: ..
      dockerfile: frontend/apps/audit-dashboard/Dockerfile
    container_name: financial_audit_dashboard
    ports:
      - "3004:80"
    networks:
      - frontend-net

  # ---------------------------------------------------------------------------
  # FRONTEND - CARD OPERATIONS (port 3005)
  # ISO 8583 message tools, HSM key management, and PIN encryption operations.
  # Nginx proxies /api requests to the PIN Encryption Service.
  # ---------------------------------------------------------------------------
  card-operations:
    build:
      context: ..
      dockerfile: frontend/apps/card-operations/Dockerfile
    container_name: financial_card_operations
    ports:
      - "3005:80"
    depends_on:
      - pin-encryption-service
    networks:
      - frontend-net

  # ---------------------------------------------------------------------------
  # DB SEED
  # One-shot container that waits for the TransactionService EF migrations to
  # finish, then truncates and re-populates Users + Transactions with known
  # test data. Exits 0 on success; Docker restarts it on failure (restart:
  # on-failure) so it keeps retrying while the service is still migrating.
  #
  # To run manually after the stack is up:
  #   docker-compose run --rm db-seed
  # ---------------------------------------------------------------------------
  db-seed:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: financial_db_seed
    entrypoint: ["/bin/bash", "/database/seed.sh"]
    environment:
      - SA_PASSWORD=${SA_PASSWORD}
    volumes:
      - ../database:/database:ro
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure
    networks:
      - backend-net

  # ---------------------------------------------------------------------------
  # SUPERAPP (port 3000)
  # Unified single-page application combining all five dashboards behind one
  # URL. Nginx routes /api/hsm and /api/iso8583 to the PIN Encryption Service
  # and all other /api calls to the API Gateway.
  # ---------------------------------------------------------------------------
  superapp:
    build:
      context: ..
      dockerfile: frontend/apps/superapp/Dockerfile
    container_name: financial_superapp
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
      - pin-encryption-service
    networks:
      - frontend-net

# =============================================================================
# NETWORKS
# Two-network topology for security isolation (ISO 27001 A.13.1.1):
#   frontend-net - frontends, API Gateway, Grafana (public-facing)
#   backend-net  - all backend services, databases, messaging (internal only)
# The API Gateway spans both networks as the sole entry point.
# =============================================================================
networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
    internal: true

# =============================================================================
# NAMED VOLUMES
# =============================================================================
volumes:
  sqlserver_data:
  grafana_data:
  prometheus_data:
